function MarketLiveMod() {
  const all = Object.values(BDC);
  const tickers = all.map(p => p.ticker);
  const [pxData, setPxData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [fetchedAt, setFetchedAt] = useState(null);
  const [months, setMonths] = useState(12);

  const fetchPrices = async (m) => {
    setLoading(true);
    setError(null);
    try {
      const now = Math.floor(Date.now() / 1000);
      const period1 = now - m * 30 * 24 * 60 * 60;
      const results = {};

      await Promise.all(tickers.map(async (ticker) => {
        try {
          const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?period1=${period1}&period2=${now}&interval=1d&includePrePost=false`;
          const res = await fetch(url);
          if (!res.ok) { results[ticker] = []; return; }
          const data = await res.json();
          const chart = data?.chart?.result?.[0];
          if (!chart) { results[ticker] = []; return; }
          const ts = chart.timestamp || [];
          const cl = chart.indicators?.quote?.[0]?.close || [];
          results[ticker] = ts.map((t, i) => cl[i] != null ? { ts: t, close: Math.round(cl[i] * 100) / 100 } : null).filter(Boolean);
        } catch { results[ticker] = []; }
      }));

      // Build weekly merged series
      const baseTicker = tickers.find(t => results[t]?.length > 0) || tickers[0];
      const baseDates = results[baseTicker] || [];
      const weeklyIdx = baseDates.filter((_, i) => i % 5 === 0);
      if (baseDates.length > 0 && weeklyIdx[weeklyIdx.length - 1]?.ts !== baseDates[baseDates.length - 1]?.ts) {
        weeklyIdx.push(baseDates[baseDates.length - 1]);
      }

      // For each weekly timestamp, find closest price for each ticker
      const weekly = weeklyIdx.map(ref => {
        const d = new Date(ref.ts * 1000);
        const label = `${d.getMonth()+1}/${d.getDate()}/${String(d.getFullYear()).slice(2)}`;
        const row = { d: label };
        tickers.forEach(t => {
          // Find the entry with the closest timestamp
          const arr = results[t];
          if (!arr || arr.length === 0) return;
          let best = arr[0];
          for (const entry of arr) {
            if (Math.abs(entry.ts - ref.ts) < Math.abs(best.ts - ref.ts)) best = entry;
          }
          if (Math.abs(best.ts - ref.ts) < 5 * 24 * 3600) row[t] = best.close;
        });
        return row;
      });

      setPxData(weekly);
      setFetchedAt(new Date().toISOString());
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  };

  // Fetch on mount
  useState(() => { fetchPrices(months); }, []);
  // Also trigger on months change
  const handleMonthsChange = (m) => { setMonths(m); fetchPrices(m); };

  // Build P/NAV from live prices + quarterly NAV
  const getCurrentNav = (p, dateStr) => {
    const parts = dateStr.split("/");
    const m = parseInt(parts[0]);
    const y = parseInt(parts[2]) + 2000;
    const months = { Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12 };
    for (let i = p.monthlyPx.length - 1; i >= 0; i--) {
      const label = p.monthlyPx[i].d;
      if (label.includes("-")) return p.monthlyPx[i].n;
      const mo = months[label.slice(0, 3)];
      const yr = 2000 + parseInt(label.slice(4));
      if (yr < y || (yr === y && mo <= m)) return p.monthlyPx[i].n;
    }
    return p.nav;
  };

  const pNavData = pxData ? pxData.map(row => {
    const pNav = { d: row.d };
    all.forEach(p => {
      if (row[p.ticker] != null) {
        const nav = getCurrentNav(p, row.d);
        if (nav > 0) pNav[p.ticker] = (row[p.ticker] / nav) * 100;
      }
    });
    return pNav;
  }) : [];

  return (
    <div>
      {/* Controls */}
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
        <span style={{ fontFamily: mono, fontSize: 10, color: C.navy, fontWeight: 700, textTransform: "uppercase" }}>Period:</span>
        {[3, 6, 12, 24].map(m => (
          <button key={m} onClick={() => handleMonthsChange(m)} style={{
            padding: "4px 12px", border: `1px solid ${months === m ? C.navy : C.pale}`, borderRadius: 3,
            background: months === m ? C.navy : "transparent", color: months === m ? "#fff" : C.navy,
            fontFamily: mono, fontSize: 10, fontWeight: 600, cursor: "pointer",
          }}>{m}M</button>
        ))}
        <button onClick={() => fetchPrices(months)} style={{
          padding: "4px 12px", border: `1px solid ${C.green}`, borderRadius: 3,
          background: "transparent", color: C.green, fontFamily: mono, fontSize: 10, fontWeight: 600, cursor: "pointer", marginLeft: 8,
        }}>↻ Refresh</button>
        <span style={{ fontFamily: mono, fontSize: 9, color: C.muted, marginLeft: "auto" }}>
          {loading ? "Fetching..." : error ? `⚠ ${error}` : `✓ Live data as of ${fetchedAt ? new Date(fetchedAt).toLocaleString() : "—"}`}
        </span>
      </div>

      {loading && (
        <div style={{ fontFamily: mono, fontSize: 12, color: C.muted, padding: 60, textAlign: "center" }}>
          Fetching live prices from Yahoo Finance for {tickers.join(", ")}...
        </div>
      )}

      {!loading && error && !pxData && (
        <div style={{ fontFamily: mono, fontSize: 12, color: C.red, padding: 40, textAlign: "center", lineHeight: 1.8 }}>
          Could not fetch live prices: {error}<br />
          <span style={{ fontSize: 10, color: C.muted }}>This may be blocked by your corporate network. Use the static "Market" tab as a fallback.</span>
        </div>
      )}

      {!loading && pxData && pxData.length > 0 && (
        <>
          {/* Share Price Chart */}
          <div style={{ fontFamily: mono, fontSize: 10, fontWeight: 700, color: C.navy, textTransform: "uppercase", letterSpacing: "0.06em", padding: "6px 8px", background: C.frost, borderLeft: `3px solid ${C.navy}`, marginBottom: 8 }}>
            Share Price — Live ({months}M)
          </div>
          <ResponsiveContainer width="100%" height={380}>
            <ComposedChart data={pxData} margin={{ top: 10, right: 20, bottom: 10, left: 10 }}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.frost} />
              <XAxis dataKey="d" tick={{ fontSize: 7, fontFamily: mono, fill: C.muted }} interval={Math.floor(pxData.length / 10)} />
              <YAxis tick={{ fontSize: 9, fontFamily: mono, fill: C.muted }} tickFormatter={v => `$${v}`} />
              <Tooltip contentStyle={{ fontFamily: mono, fontSize: 10 }} formatter={(v, name) => [`$${Number(v).toFixed(2)}`, name]} />
              {all.map(p => (
                <Line key={p.ticker} type="monotone" dataKey={p.ticker} stroke={p.color} strokeWidth={1.5} dot={false} name={p.ticker} connectNulls />
              ))}
            </ComposedChart>
          </ResponsiveContainer>
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap", justifyContent: "center", marginTop: 6, marginBottom: 24 }}>
            {all.map(p => {
              const pts = pxData.filter(r => r[p.ticker] != null);
              const first = pts[0] ? pts[0][p.ticker] : p.price;
              const last = pts[pts.length - 1] ? pts[pts.length - 1][p.ticker] : p.price;
              const ret = ((last / first) - 1) * 100;
              return (
                <span key={p.ticker} style={{ fontFamily: mono, fontSize: 10 }}>
                  <span style={{ display: "inline-block", width: 10, height: 3, background: p.color, marginRight: 4, verticalAlign: "middle" }}></span>
                  <span style={{ color: p.color, fontWeight: 700 }}>{p.ticker}</span>
                  <span style={{ marginLeft: 3, color: C.muted }}>${last?.toFixed(2)}</span>
                  <span style={{ color: ret >= 0 ? C.green : C.red, marginLeft: 4 }}>{ret >= 0 ? "+" : ""}{ret.toFixed(1)}%</span>
                </span>
              );
            })}
          </div>

          {/* P/NAV Chart */}
          <div style={{ fontFamily: mono, fontSize: 10, fontWeight: 700, color: C.navy, textTransform: "uppercase", letterSpacing: "0.06em", padding: "6px 8px", background: C.frost, borderLeft: `3px solid ${C.navy}`, marginBottom: 8 }}>
            Price / NAV — Live ({months}M, NAV updated quarterly)
          </div>
          <ResponsiveContainer width="100%" height={380}>
            <ComposedChart data={pNavData} margin={{ top: 10, right: 20, bottom: 10, left: 10 }}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.frost} />
              <XAxis dataKey="d" tick={{ fontSize: 7, fontFamily: mono, fill: C.muted }} interval={Math.floor(pNavData.length / 10)} />
              <YAxis tick={{ fontSize: 9, fontFamily: mono, fill: C.muted }} tickFormatter={v => `${v.toFixed(0)}%`} />
              <Tooltip contentStyle={{ fontFamily: mono, fontSize: 10 }} formatter={(v, name) => [`${Number(v).toFixed(1)}%`, name]} />
              <ReferenceLine y={100} stroke={C.navy} strokeWidth={1.5} strokeDasharray="6 3" label={{ value: "NAV Par", position: "insideTopLeft", fontSize: 9, fill: C.navy, fontFamily: mono }} />
              {all.map(p => (
                <Line key={p.ticker} type="monotone" dataKey={p.ticker} stroke={p.color} strokeWidth={1.5} dot={false} name={p.ticker} connectNulls />
              ))}
            </ComposedChart>
          </ResponsiveContainer>
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap", justifyContent: "center", marginTop: 6, marginBottom: 16 }}>
            {all.map(p => {
              const pts = pNavData.filter(r => r[p.ticker] != null);
              const cur = pts.length > 0 ? pts[pts.length - 1][p.ticker] : (p.price / p.nav * 100);
              return (
                <span key={p.ticker} style={{ fontFamily: mono, fontSize: 10 }}>
                  <span style={{ display: "inline-block", width: 10, height: 3, background: p.color, marginRight: 4, verticalAlign: "middle" }}></span>
                  <span style={{ color: p.color, fontWeight: 700 }}>{p.ticker}</span>
                  <span style={{ color: cur >= 100 ? C.green : C.red, marginLeft: 4 }}>{cur.toFixed(1)}%</span>
                </span>
              );
            })}
          </div>

          <div style={{ fontFamily: mono, fontSize: 9, color: C.muted, textAlign: "center", marginTop: 8 }}>
            Prices from Yahoo Finance. P/NAV uses most recently reported quarterly NAV per share. NAV does not update between filings.
          </div>
        </>
      )}
    </div>
  );
}

function BDCFramework() {
  const [bdc, setBdc] = useState("ARCC");
  const [view, setView] = useState("exec");
  const [tab, setTab] = useState("capstructure");
  const p = BDC[bdc];

  const isMeta = view === "methodology" || view === "compare" || view === "backtest" || view === "market" || view === "exec" || view === "marketlive";
  const activeBDC = isMeta ? null : view;
  const activeP = activeBDC ? BDC[activeBDC] : p;

  const mods = {
    capstructure: <CapMod p={activeP} />,
    implied: <ImpliedMod p={activeP} />,
    cohort: <CohortMod p={activeP} />,
    na: <NAMod p={activeP} />,
    sector: <SectorMod p={activeP} />,
    seniority: <SenMod p={activeP} />,
    vintage: <VintMod p={activeP} />,
  };

  const topNav = [
    { id: "exec", label: "Executive Summary", color: C.navy },
    { id: "market", label: "Market", color: C.sky },
    { id: "marketlive", label: "Market Live", color: "#2E86AB" },
    { id: "compare", label: "Comparison", color: C.navy },
    ...Object.values(BDC).map(b => ({ id: b.ticker, label: b.ticker, sub: b.name, color: b.color })),
    { id: "backtest", label: "COVID Backtest", color: C.amber },
    { id: "methodology", label: "Methodology", color: C.steel },
  ];

  const headers = {
    exec: { title: "BDC Equity — Executive Summary", sub: "Credit-Adjusted Recovery Framework | 7 Names | As of March 11, 2026" },
    methodology: { title: "BDC Equity Investment Framework", sub: "Credit-Adjusted Recovery Methodology" },
    market: { title: "Market Overview", sub: `${Object.keys(BDC).join(" | ")} | 12-Month Performance` },
    marketlive: { title: "Market Live", sub: `${Object.keys(BDC).join(" | ")} | Real-Time Pricing from Yahoo Finance` },
    compare: { title: "BDC Head-to-Head Comparison", sub: `${Object.keys(BDC).join(" vs ")} | As of March 11, 2026` },
    backtest: { title: "COVID-19 Pandemic Backtest", sub: "Validating Credit-Adjusted Recovery Against March 2020 Selloff" },
  };

  return (
    <div style={{ minHeight: "100vh", background: "#F4F6F9", padding: "20px 24px", fontFamily: sans }}>
      {/* Top-Level Nav */}
      <div style={{ display: "flex", gap: 8, marginBottom: 14, flexWrap: "wrap" }}>
        {topNav.map(n => (
          <button key={n.id} onClick={() => { setView(n.id); if (!["methodology","compare","backtest","market","marketlive","exec"].includes(n.id)) { setBdc(n.id); setTab("capstructure"); } }}
            style={{
              padding: "10px 20px", border: `2px solid ${n.color}`, cursor: "pointer",
              fontFamily: mono, fontSize: 13, fontWeight: 700, letterSpacing: "0.06em",
              background: view === n.id ? n.color : "transparent",
              color: view === n.id ? "#fff" : n.color, borderRadius: 4,
            }}>
            {n.label}
            {n.sub && <span style={{ fontWeight: 400, fontSize: 10, marginLeft: 8, opacity: 0.8 }}>{n.sub}</span>}
          </button>
        ))}
      </div>

      {/* Header */}
      <div style={{ marginBottom: 14 }}>
        <h1 style={{ fontSize: 22, fontWeight: 700, color: isMeta ? (view === "compare" ? C.navy : view === "backtest" ? C.amber : view === "market" ? C.sky : view === "marketlive" ? "#2E86AB" : view === "exec" ? C.navy : C.steel) : activeP.color, margin: 0 }}>
          {isMeta ? headers[view].title : `${activeP.ticker} — Portfolio Quality Deep Dive`}
        </h1>
        <span style={{ fontFamily: mono, fontSize: 12, color: C.muted }}>
          {isMeta ? headers[view].sub : `${activeP.name} | As of ${activeP.asOf}`}
        </span>
      </div>

      {/* BDC-specific tabs (only for individual BDC views) */}
      {!isMeta && (
        <div style={{ display: "flex", gap: 2, marginBottom: 14, borderBottom: `2px solid ${activeP.color}`, flexWrap: "wrap" }}>
          {TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              style={{
                padding: "7px 14px", border: "none", cursor: "pointer",
                fontFamily: mono, fontSize: 11, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.04em",
                background: tab === t.id ? activeP.color : "transparent",
                color: tab === t.id ? "#fff" : C.steel, borderRadius: "4px 4px 0 0",
              }}>
              {t.label}
            </button>
          ))}
        </div>
      )}

      {/* Content */}
      <div style={{ background: "#fff", borderRadius: "0 4px 4px 4px", padding: 20, border: `1px solid ${C.pale}`, boxShadow: "0 1px 4px rgba(12,35,64,0.06)" }}>
        {view === "exec" && <ExecSummary />}
        {view === "methodology" && <MethodologyMod />}
        {view === "market" && <MarketMod />}
        {view === "marketlive" && <MarketLiveMod />}
        {view === "compare" && <CompMod />}
        {view === "backtest" && <CovidBacktestMod />}
        {!isMeta && (
          <>
            <h3 style={{ fontFamily: sans, fontSize: 14, fontWeight: 600, color: activeP.color, margin: "0 0 12px 0", textTransform: "uppercase", letterSpacing: "0.05em" }}>
              {activeP.ticker} — {(TABS.find(t => t.id === tab) || {}).label}
            </h3>
            {mods[tab]}
          </>
        )}
      </div>

      <div style={{ marginTop: 14, fontFamily: mono, fontSize: 10, color: C.muted, textAlign: "center" }}>
        BDC Investment Framework | Prepared for IC Review | Confidential
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(BDCFramework));
</script>
</body>
</html>
