// ── Daily Price Generator ──
// Interpolates monthly anchors into ~252 trading days with deterministic noise
function genDaily(anchors, months) {
  // months = how many trailing months from last anchor to show (12 or 24)
  const endAnchor = anchors[anchors.length - 1];
  const endDate = new Date(endAnchor.y, endAnchor.m - 1, 11); // approx last date
  const startDate = new Date(endDate);
  startDate.setMonth(startDate.getMonth() - months);

  // Filter anchors to the window
  const filtered = anchors.filter(a => {
    const d = new Date(a.y, a.m - 1, 15);
    return d >= startDate && d <= endDate;
  });
  if (filtered.length < 2) return [];

  // Build daily series by interpolating between anchors
  const days = [];
  const seed = filtered[0].c * 1000; // deterministic seed from first price
  let rng = seed;
  const nextRng = () => { rng = (rng * 16807 + 0) % 2147483647; return (rng / 2147483647) - 0.5; };

  for (let i = 0; i < filtered.length - 1; i++) {
    const a0 = filtered[i];
    const a1 = filtered[i + 1];
    const d0 = new Date(a0.y, a0.m - 1, 15);
    const d1 = new Date(a1.y, a1.m - 1, 15);
    const tradingDays = Math.round((d1 - d0) / (1000 * 60 * 60 * 24) * 5 / 7); // ~trading days
    const nDays = Math.max(tradingDays, 15);

    for (let j = 0; j < nDays; j++) {
      const t = j / nDays;
      const base = a0.c + (a1.c - a0.c) * t;
      const noise = nextRng() * Math.abs(a1.c - a0.c) * 0.35;
      const px = +(base + noise).toFixed(2);
      const dt = new Date(d0);
      dt.setDate(dt.getDate() + Math.round(j * (d1 - d0) / (1000 * 60 * 60 * 24) / nDays));
      // Skip weekends
      if (dt.getDay() === 0 || dt.getDay() === 6) continue;
      const label = `${dt.toLocaleDateString("en-US", { month: "short" })} ${dt.getDate()}`;
      days.push({ d: label, px, dt: dt.getTime() });
    }
  }
  // Add final point
  days.push({ d: `Mar 11`, px: filtered[filtered.length - 1].c, dt: endDate.getTime() });
  return days;
}

function ImpliedMod({ p }) {
  const rFVC = p.fvCost;
  const ncPS = p.nonCredit.reduce((s, f) => s + f.ps, 0);
  const ncEq = ncPS * p.shares;
  const totalDisc = p.nav - p.price;
  const residualCredit = totalDisc - ncPS;
  const sc = [0, -0.05, -0.10, -0.15, -0.20, -0.25].map(d => {
    const px = +(p.price * (1 + d)).toFixed(2);
    const eq = px * p.shares;
    const iFV = eq + p.liab - p.otherAssets;
    const iFVC = (iFV / p.invCost) * 100;
    const amd = p.invFV - iFV;
    const amdP = (amd / p.invFV) * 100;
    const lev = p.liab / eq;
    const ac = (eq + p.liab) / p.liab;
    const aEq = eq + ncEq;
    const aFV = aEq + p.liab - p.otherAssets;
    const aFVC = (aFV / p.invCost) * 100;
    const aAmd = Math.max(0, p.invFV - aFV);
    const aAmdP = Math.max(0, (aAmd / p.invFV) * 100);

}

// ── Head-to-Head Comparison ──
function CompMod() {
  const all = Object.values(BDC);

  // Helper to compute implied marks for a BDC
  const getImplied = (p) => {
    const ncPS = p.nonCredit.reduce((s, f) => s + f.ps, 0);
    const ncEq = ncPS * p.shares;
    const eq = p.price * p.shares;
    const iFV = eq + p.liab - p.otherAssets;
    const iFVC = (iFV / p.invCost) * 100;
    const aEq = eq + ncEq;
    const aFV = aEq + p.liab - p.otherAssets;
    const aFVC = (aFV / p.invCost) * 100;
    const disc = ((1 - p.price / p.nav) * 100);
    const residual = (p.nav - p.price) - ncPS;
    return { ncPS, iFVC, aFVC, disc, residual, residualPct: (residual / p.nav) * 100 };
  };

  // Latest quarterly data
  const getLatest = (p) => {
    const na = p.nonAccrual[p.nonAccrual.length - 1];
    const mc = p.markCohort[p.markCohort.length - 1];
    const sen = p.seniority[p.seniority.length - 1];
    const navB = p.navBridge[p.navBridge.length - 1];
    return { na, mc, sen, navB };
  };

  const data = all.map(p => ({ p, imp: getImplied(p), lat: getLatest(p) }));

  // Color helper: green if better, red if worse
  const better = (val, ref, lower) => lower ? val <= ref ? C.green : C.red : val >= ref ? C.green : C.red;

  // Section renderer
  const Section = ({ title, rows }) => (
    <div style={{ marginBottom: 16 }}>
      <div style={{ fontFamily: mono, fontSize: 10, fontWeight: 700, color: C.navy, textTransform: "uppercase", letterSpacing: "0.06em", padding: "6px 8px", background: C.frost, borderLeft: `3px solid ${C.navy}`, marginBottom: 0 }}>{title}</div>
      <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: mono, fontSize: 11 }}>
        <tbody>
          {rows.map((r, i) => (
            <tr key={i} style={{ borderBottom: `1px solid ${C.frost}`, background: i % 2 === 0 ? "#fff" : C.frost }}>
              <td style={{ padding: "5px 8px", color: C.navy, fontWeight: 600, fontSize: 10, width: "40%" }}>{r.label}</td>
              {r.values.map((v, j) => (
                <td key={j} style={{ padding: "5px 8px", textAlign: "right", fontWeight: 600, width: `${60 / all.length}%`, color: v.color || C.navy }}>
                  {v.text}
                </td>
              ))}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );

  // Build rows
  const vRow = (label, fn, opts = {}) => ({
    label,
    values: data.map(d => {
      const raw = fn(d);
      const text = typeof raw === "number" ? (opts.fmt ? opts.fmt(raw) : raw.toFixed(1)) : raw;
      let color = C.navy;
      if (opts.colorFn) color = opts.colorFn(fn(d), d);
      return { text: String(text), color };
    }),
  });

  return (
    <div>
      {/* Header with BDC names */}
      <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: mono, marginBottom: 12 }}>
        <thead>
          <tr style={{ borderBottom: `2px solid ${C.navy}` }}>
            <th style={{ width: "40%", padding: "8px", textAlign: "left", fontSize: 10, color: C.muted, textTransform: "uppercase" }}>Metric</th>
            {all.map(p => (
              <th key={p.ticker} style={{ padding: "8px", textAlign: "right", fontSize: 14, fontWeight: 700, color: p.color, width: `${60 / all.length}%` }}>
                {p.ticker}
              </th>
            ))}
          </tr>
        </thead>
      </table>


      {/* ── Discount Attribution Bridges — side by side ── */}
      <div style={{ marginTop: 16, marginBottom: 16 }}>
        <div style={{ fontFamily: mono, fontSize: 10, fontWeight: 700, color: C.navy, textTransform: "uppercase", letterSpacing: "0.06em", padding: "6px 8px", background: C.frost, borderLeft: `3px solid ${C.navy}`, marginBottom: 0 }}>
          Discount Attribution — NAV to Market Price
        </div>
        <p style={{ fontFamily: mono, fontSize: 9, color: C.muted, margin: "6px 0 10px 0" }}>
          Decomposes each BDC's discount into non-credit factors and residual credit concern. Sorted by discount (smallest to largest).
        </p>
        <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
          {data.sort((a, b) => (b.p.price / b.p.nav) - (a.p.price / a.p.nav)).map(d => {
            const totalDisc = d.p.nav - d.p.price;
            const ncPS = d.imp.ncPS;
            const residual = totalDisc - ncPS;
            return (
              <div key={d.p.ticker} style={{ flex: "1 1 12%", minWidth: 135 }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: mono, fontSize: 10 }}>
                  <thead>
                    <tr><th colSpan={3} style={{ padding: "5px 4px", textAlign: "left", color: d.p.color, fontSize: 11, fontWeight: 700, textTransform: "uppercase", borderBottom: `2px solid ${d.p.color}` }}>
                      {d.p.ticker} <span style={{ fontWeight: 400, fontSize: 9, color: C.muted }}>({d.imp.disc.toFixed(0)}% disc.)</span>
                    </th></tr>
                    <tr style={{ borderBottom: `1px solid ${C.pale}` }}>
                      {["Factor", "$/Sh", "% NAV"].map((h, j) => (
                        <th key={j} style={{ padding: "3px 4px", textAlign: j === 0 ? "left" : "right", color: C.navy, fontWeight: 700, fontSize: 7, textTransform: "uppercase" }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    <tr style={{ background: "#E8F5EC" }}>
                      <td style={{ padding: "3px 4px", color: C.green, fontWeight: 700, fontSize: 9 }}>NAV</td>
                      <td style={{ padding: "3px 4px", textAlign: "right", color: C.green, fontWeight: 700 }}>${d.p.nav.toFixed(2)}</td>
                      <td style={{ padding: "3px 4px", textAlign: "right", color: C.green }}>100%</td>
                    </tr>
                    {d.p.nonCredit.map((f, i) => (
                      <tr key={i} style={{ borderBottom: `1px solid ${C.frost}`, background: i % 2 === 0 ? "#fff" : C.frost }}>
                        <td style={{ padding: "3px 4px", fontSize: 8, color: C.navy }}>
                          <span style={{ display: "inline-block", width: 6, height: 6, background: f.color, borderRadius: 1, marginRight: 3, verticalAlign: "middle" }}></span>
                          {f.label}
                        </td>
                        <td style={{ padding: "3px 4px", textAlign: "right", color: C.red, fontSize: 9 }}>({f.ps.toFixed(2)})</td>
                        <td style={{ padding: "3px 4px", textAlign: "right", color: C.red, fontSize: 9 }}>({((f.ps / d.p.nav) * 100).toFixed(1)}%)</td>
                      </tr>
                    ))}
                    <tr style={{ borderTop: `1px solid ${C.steel}`, background: C.frost }}>
                      <td style={{ padding: "3px 4px", color: C.steel, fontWeight: 700, fontSize: 8 }}>Non-Credit</td>
                      <td style={{ padding: "3px 4px", textAlign: "right", fontWeight: 700, color: C.steel, fontSize: 9 }}>({ncPS.toFixed(2)})</td>
                      <td style={{ padding: "3px 4px", textAlign: "right", fontWeight: 700, color: C.steel, fontSize: 9 }}>({((ncPS / d.p.nav) * 100).toFixed(1)}%)</td>
                    </tr>
                    <tr style={{ background: "#FFF5F5" }}>
                      <td style={{ padding: "3px 4px", color: C.red, fontWeight: 700, fontSize: 8 }}>Credit Residual</td>
                      <td style={{ padding: "3px 4px", textAlign: "right", fontWeight: 700, color: C.red, fontSize: 9 }}>({residual.toFixed(2)})</td>
                      <td style={{ padding: "3px 4px", textAlign: "right", fontWeight: 700, color: C.red, fontSize: 9 }}>({((residual / d.p.nav) * 100).toFixed(1)}%)</td>
                    </tr>
                    <tr style={{ borderTop: `2px solid ${d.p.color}`, background: "#FFF8E7" }}>
                      <td style={{ padding: "4px 4px", color: d.p.color, fontWeight: 700, fontSize: 9 }}>Price</td>
                      <td style={{ padding: "4px 4px", textAlign: "right", fontWeight: 700, color: d.p.color, fontSize: 11 }}>${d.p.price.toFixed(2)}</td>
                      <td style={{ padding: "4px 4px", textAlign: "right", fontWeight: 700, color: d.p.color, fontSize: 9 }}>{((d.p.price / d.p.nav) * 100).toFixed(1)}%</td>
                    </tr>
                  </tbody>
                  <tfoot><tr><td colSpan={3} style={{ padding: "3px 4px", fontSize: 7, color: C.muted }}>
                    Recovery: {d.imp.aFVC.toFixed(1)}% implied vs {d.p.fvCost}% reported ({(d.p.fvCost - d.imp.aFVC).toFixed(1)}pp gap)
                  </td></tr></tfoot>
                </table>
              </div>
            );
          })}
        </div>
      </div>

      {/* ── Return Sensitivity: If actual recovery > credit-implied recovery ── */}
      <div style={{ marginTop: 16, marginBottom: 16 }}>
        <div style={{ fontFamily: mono, fontSize: 10, fontWeight: 700, color: C.navy, textTransform: "uppercase", letterSpacing: "0.06em", padding: "6px 8px", background: C.frost, borderLeft: `3px solid ${C.green}`, marginBottom: 0 }}>
          Return Sensitivity — Implied Share Price at Higher Recovery Assumptions
        </div>
        <p style={{ fontFamily: mono, fontSize: 9, color: C.muted, margin: "6px 0 10px 0" }}>
          If your credit view is that actual portfolio recovery will exceed the market-implied level, this table shows the implied share price and % return from the current entry. Non-credit discount factors held constant; only the credit component adjusts.
        </p>

        {(() => {
          const ROWS = 7; // including base and par

          const bdcCalcs = all.map(p => {
            const imp = getImplied(p);
            const ncPS = imp.ncPS;
            const base = imp.aFVC;

            const reversePrice = (recovery) => {
              const impliedInvFV = (recovery / 100) * p.invCost;
              const creditAdjEq = impliedInvFV - p.liab + p.otherAssets;
              const marketEq = creditAdjEq - (ncPS * p.shares);
              return Math.max(0, marketEq / p.shares);
            };

            // Generate 7 evenly spaced levels: credit-implied → 100% par
            const gap = 100 - base;
            const step = gap / (ROWS - 1);
            const levels = Array.from({ length: ROWS }, (_, i) => {
              const recovery = i === ROWS - 1 ? 100 : +(base + i * step).toFixed(1);
              const impliedPrice = reversePrice(recovery);
              const priceReturn = ((impliedPrice / p.price) - 1) * 100;
              return { recovery, impliedPrice, priceReturn, isBase: i === 0, isPar: i === ROWS - 1 };
            });

            // Also compute at reported marks
            const reportedPrice = reversePrice(p.fvCost);
            const reportedReturn = ((reportedPrice / p.price) - 1) * 100;
            const divYield = (p.divAnn / p.price) * 100;

            return { p, base, levels, reportedPrice, reportedReturn, reportedFVC: p.fvCost, divYield };
          });

          // Sort by P/NAV descending (smallest discount first) so order is ARCC → OBDC → TCPC
          bdcCalcs.sort((a, b) => (b.p.price / b.p.nav) - (a.p.price / a.p.nav));

          return (
            <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
              {bdcCalcs.map((bc) => (
                <div key={bc.p.ticker} style={{ flex: "1 1 12%", minWidth: 135 }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: mono, fontSize: 11 }}>
                    <thead>
                      <tr>
                        <th colSpan={3} style={{ padding: "6px 6px", textAlign: "left", color: bc.p.color, fontSize: 12, fontWeight: 700, textTransform: "uppercase", borderBottom: `2px solid ${bc.p.color}` }}>
                          {bc.p.ticker} <span style={{ fontWeight: 400, fontSize: 10, color: C.muted }}>Entry: ${bc.p.price}</span>
                        </th>
                      </tr>
                      <tr style={{ borderBottom: `1px solid ${C.pale}` }}>
                        {["Recovery (FV/Cost)", "Implied Price", "Price Return"].map((h, j) => (
                          <th key={j} style={{ padding: "4px 6px", textAlign: j === 0 ? "left" : "right", color: C.navy, fontWeight: 700, fontSize: 8, textTransform: "uppercase" }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {bc.levels.map((s, i) => {
                        const isReported = Math.abs(s.recovery - bc.reportedFVC) < ((100 - bc.base) / (ROWS - 1)) * 0.6;
                        const bg = s.isBase ? "#FFF8E7" : s.isPar ? "#E8F5EC" : isReported ? "#F0FFF4" : i % 2 === 0 ? "#fff" : C.frost;
                        const retColor = s.isBase ? C.muted : s.priceReturn >= 50 ? "#1A6B35" : s.priceReturn >= 20 ? C.green : s.priceReturn >= 5 ? C.amber : C.muted;
                        return (
                          <tr key={i} style={{ borderBottom: s.isPar ? `2px solid ${C.green}` : `1px solid ${C.frost}`, background: bg }}>
                            <td style={{ padding: "5px 6px", fontWeight: s.isBase || s.isPar || isReported ? 700 : 500, fontSize: 10, color: s.isPar ? C.green : s.isBase ? C.red : C.navy }}>
                              {s.recovery.toFixed(1)}%
                              {s.isBase && <span style={{ fontSize: 7, color: C.red, marginLeft: 4 }}>MKT IMPLIED</span>}
                              {isReported && !s.isBase && !s.isPar && <span style={{ fontSize: 7, color: C.green, marginLeft: 4 }}>REPORTED</span>}
                              {s.isPar && <span style={{ fontSize: 7, color: C.green, marginLeft: 4 }}>PAR</span>}
                            </td>
                            <td style={{ padding: "5px 6px", textAlign: "right", fontWeight: s.isBase || s.isPar ? 700 : 500, color: s.isPar ? C.green : C.navy }}>
                              ${s.impliedPrice.toFixed(2)}
                            </td>
                            <td style={{ padding: "5px 6px", textAlign: "right", fontWeight: s.isBase ? 600 : 700, color: retColor, fontSize: s.isPar ? 14 : 11 }}>
                              {s.isBase ? "Entry" : `+${s.priceReturn.toFixed(1)}%`}
                            </td>
                          </tr>
                        );
                      })}
                      {/* Reported marks row if not already close to a level */}
                      {!bc.levels.some(s => Math.abs(s.recovery - bc.reportedFVC) < ((100 - bc.base) / (ROWS - 1)) * 0.6) && (
                        <tr style={{ borderTop: `1px solid ${C.green}`, background: "#F0FFF4" }}>
                          <td style={{ padding: "5px 6px", fontWeight: 700, fontSize: 10, color: C.green }}>
                            {bc.reportedFVC.toFixed(1)}% <span style={{ fontSize: 7 }}>REPORTED</span>
                          </td>
                          <td style={{ padding: "5px 6px", textAlign: "right", fontWeight: 700, color: C.green }}>${bc.reportedPrice.toFixed(2)}</td>
                          <td style={{ padding: "5px 6px", textAlign: "right", fontWeight: 700, color: "#1A6B35" }}>+{bc.reportedReturn.toFixed(1)}%</td>
                        </tr>
                      )}
                      {/* Dividend yield */}
                      <tr style={{ background: C.frost, borderTop: `1px solid ${C.pale}` }}>
                        <td style={{ padding: "5px 6px", color: C.steel, fontWeight: 600, fontSize: 10 }}>+ Annual Div. Yield</td>
                        <td style={{ padding: "5px 6px", textAlign: "right", color: C.steel }}>—</td>
                        <td style={{ padding: "5px 6px", textAlign: "right", fontWeight: 700, color: C.green }}>+{bc.divYield.toFixed(1)}%</td>
                      </tr>
                    </tbody>
                    <tfoot>
                      <tr style={{ borderTop: `2px solid ${bc.p.color}` }}>
                        <td colSpan={3} style={{ padding: "4px 6px", fontSize: 8, color: C.muted }}>
                          Capital appreciation only. Non-credit discount (${bc.p.nonCredit.reduce((s,f)=>s+f.ps,0).toFixed(2)}/sh) held constant.
                        </td>
                      </tr>
                    </tfoot>
                  </table>
                </div>
              ))}
            </div>
          );
        })()}
      </div>

      {/* Equity & Valuation */}
      <Section title="Equity & Valuation" rows={[
        vRow("Share Price", d => d.p.price, { fmt: v => `$${v.toFixed(2)}` }),
        vRow("NAV / Share", d => d.p.nav, { fmt: v => `$${v.toFixed(2)}` }),
        vRow("Price / NAV", d => (d.p.price / d.p.nav * 100), { fmt: v => `${v.toFixed(1)}%`, colorFn: v => v >= 100 ? C.green : v >= 90 ? C.amber : C.red }),
        vRow("Discount to NAV", d => ((1 - d.p.price / d.p.nav) * 100), { fmt: v => `(${v.toFixed(1)}%)`, colorFn: () => C.red }),
        vRow("Market Cap", d => d.p.price * d.p.shares, { fmt: v => v > 5000 ? `$${(v/1000).toFixed(1)}B` : `$${v.toFixed(0)}M` }),
        vRow("Dividend Yield", d => (d.p.divAnn / d.p.price * 100), { fmt: v => `${v.toFixed(1)}%`, colorFn: () => C.green }),
        vRow("Core EPS (FY25)", d => d.p.coreEPS, { fmt: v => `$${v.toFixed(2)}` }),
        vRow("Dividend Coverage", d => (d.p.coreEPS / d.p.divAnn * 100), { fmt: v => `${v.toFixed(0)}%`, colorFn: v => v >= 110 ? C.green : v >= 100 ? C.amber : C.red }),
        vRow("52-Week Range", d => `$${d.p.lo52} – $${d.p.hi52}`),
      ]} />

      {/* Credit-Implied Recovery */}
      <Section title="Market-Implied Marks (Current Price)" rows={[
        vRow("Reported FV / Cost", d => d.p.fvCost, { fmt: v => `${v.toFixed(1)}%`, colorFn: v => v >= 95 ? C.green : v >= 90 ? C.amber : C.red }),
        vRow("Unadjusted Implied FV/Cost", d => d.imp.iFVC, { fmt: v => `${v.toFixed(1)}%`, colorFn: v => v >= 95 ? C.green : v >= 90 ? C.amber : C.red }),
        vRow("Non-Credit Adjustment", d => d.imp.ncPS, { fmt: v => `$${v.toFixed(2)}/sh` }),
        vRow("Credit-Implied Recovery", d => d.imp.aFVC, { fmt: v => `${v.toFixed(1)}%`, colorFn: v => v >= 95 ? C.green : v >= 90 ? C.amber : C.red }),
        vRow("Gap: Reported vs Credit-Implied", d => d.p.fvCost - d.imp.aFVC, { fmt: v => `${v.toFixed(1)}pp`, colorFn: v => v <= 1 ? C.green : v <= 3 ? C.amber : C.red }),
        vRow("Credit Residual ($/sh)", d => d.imp.residual, { fmt: v => `$${v.toFixed(2)}`, colorFn: v => v <= 0.5 ? C.green : v <= 1.5 ? C.amber : C.red }),
        vRow("Credit Residual (% of NAV)", d => d.imp.residualPct, { fmt: v => `${v.toFixed(1)}%`, colorFn: v => v <= 2 ? C.green : v <= 5 ? C.amber : C.red }),
      ]} />

      {/* Portfolio Quality */}
      <Section title="Portfolio Quality & Asset Mix" rows={[
        vRow("Total Portfolio FV", d => d.p.invFV, { fmt: v => v > 5000 ? `$${(v/1000).toFixed(1)}B` : `$${(v).toFixed(0)}M` }),
        vRow("# Portfolio Companies", d => d.p.nCo, { fmt: v => `${v}` }),
        vRow("Non-Accrual (Cost)", d => d.lat.na["Non-Accrual (Cost)"], { fmt: v => `${v.toFixed(1)}%`, colorFn: v => v <= 2 ? C.green : v <= 5 ? C.amber : C.red }),
        vRow("Non-Accrual (FV)", d => d.lat.na["Non-Accrual (FV)"], { fmt: v => `${v.toFixed(1)}%`, colorFn: v => v <= 1.5 ? C.green : v <= 3 ? C.amber : C.red }),
        vRow("Implied Recovery on NAs", d => d.lat.na["Implied Recovery"], { fmt: v => `${v.toFixed(0)}%` }),
        vRow("PIK % of Income", d => d.lat.na["PIK % of Income"], { fmt: v => `${v.toFixed(1)}%`, colorFn: v => v <= 5 ? C.green : v <= 8 ? C.amber : C.red }),
        vRow("First Lien %", d => d.p.fl, { fmt: v => `${v.toFixed(1)}%`, colorFn: v => v >= 80 ? C.green : v >= 65 ? C.amber : C.red }),
        vRow("Senior Secured %", d => d.p.ss, { fmt: v => `${v.toFixed(1)}%` }),
        vRow("Floating Rate %", d => d.p.floating, { fmt: v => `${v}%` }),
        vRow("Wtd Avg Yield", d => d.p.yield, { fmt: v => `${v.toFixed(2)}%` }),
        vRow("Par Bucket (FV/Cost ≥98%)", d => d.lat.mc["98-100% (Par)"], { fmt: v => `${v.toFixed(1)}%`, colorFn: v => v >= 60 ? C.green : v >= 45 ? C.amber : C.red }),
        vRow("Stressed + Distressed (<90%)", d => d.lat.mc["80-90% (Stressed)"] + d.lat.mc["<80% (Distressed)"], { fmt: v => `${v.toFixed(1)}%`, colorFn: v => v <= 10 ? C.green : v <= 20 ? C.amber : C.red }),
      ]} />

      {/* Capital Structure */}
      <Section title="Capital Structure & Leverage" rows={[
        vRow("Debt / Equity", d => d.p.de, { fmt: v => `${v.toFixed(2)}x`, colorFn: v => v <= 1.2 ? C.green : v <= 1.5 ? C.amber : C.red }),
        vRow("Asset Coverage", d => d.p.assets / d.p.liab, { fmt: v => `${v.toFixed(2)}x`, colorFn: v => v >= 1.5 ? C.green : v >= 1.3 ? C.amber : C.red }),
        vRow("Headroom to 2.0x Limit", d => (2.0 * d.p.equity - d.p.liab), { fmt: v => v > 5000 ? `$${(v/1000).toFixed(1)}B` : `$${v.toFixed(0)}M`, colorFn: v => v > 0 ? C.green : C.red }),
        vRow("Total Equity", d => d.p.equity, { fmt: v => v > 5000 ? `$${(v/1000).toFixed(2)}B` : `$${v.toFixed(0)}M` }),
        vRow("Total Liabilities", d => d.p.liab, { fmt: v => v > 5000 ? `$${(v/1000).toFixed(1)}B` : `$${(v/1000).toFixed(2)}B` }),
      ]} />

      <Cbox items={[
        `Across ${all.length} names: discounts range from ${Math.min(...data.map(d=>d.imp.disc)).toFixed(0)}% to ${Math.max(...data.map(d=>d.imp.disc)).toFixed(0)}%. Credit-implied recovery ranges from ${Math.min(...data.map(d=>d.imp.aFVC)).toFixed(1)}% to ${Math.max(...data.map(d=>d.imp.aFVC)).toFixed(1)}%. ${data.filter(d => d.imp.aFVC >= 95).map(d=>d.p.ticker).join(", ") || "No names"} show minimal credit concern (recovery >=95%); ${data.filter(d => d.imp.aFVC < 90).map(d=>d.p.ticker).join(", ") || "none"} show significant impairment (<90%).`,
        `Widest credit residual: ${data.sort((a,b) => b.imp.residualPct - a.imp.residualPct)[0].p.ticker} at ${data[0].imp.residualPct.toFixed(1)}% of NAV. Tightest: ${data[data.length-1].p.ticker} at ${data[data.length-1].imp.residualPct.toFixed(1)}% of NAV. The spread between these signals the framework's ability to distinguish valuation discount from fundamental impairment.`,
      ]} />
    </div>
  );
}

// ── Capital Structure ──
function CapMod({ p }) {
  const cs = p.capStructure;
  const totalCost = cs.assets.reduce((s, a) => s + a.cost, 0);
  const totalFV = cs.assets.reduce((s, a) => s + a.fv, 0);
  const totalLiab = cs.liabilities.reduce((s, l) => s + l.amt, 0) + (cs.otherLiab || 0);
  const markdown = totalCost - totalFV;
  const mdPct = ((markdown / totalCost) * 100).toFixed(1);
  const netSpread = (cs.wtdYield - cs.costOfDebt).toFixed(2);
  const secDebt = cs.liabilities.filter(l => l.type === "Secured" || l.type === "Govt").reduce((s, l) => s + l.amt, 0);
  const unsecDebt = cs.liabilities.filter(l => l.type === "Unsecured").reduce((s, l) => s + l.amt, 0);
  const fmtA = v => v >= 5000 ? `$${(v/1000).toFixed(1)}B` : `$${v.toLocaleString()}M`;

  // Equity & valuation computations
  const pNav = ((p.price / p.nav) * 100).toFixed(1);
  const disc = ((1 - p.price / p.nav) * 100).toFixed(1);
  const dy = ((p.divAnn / p.price) * 100).toFixed(1);
  const mktEquity = p.price * p.shares;
  const mktEquityFmt = mktEquity >= 5000 ? `$${(mktEquity/1000).toFixed(1)}B` : `$${mktEquity.toFixed(0)}M`;

  return (
    <div>
      {/* Equity & Valuation KPIs */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(120px, 1fr))", gap: 7, marginBottom: 14 }}>
        {[
          { l: "Share Price", v: `$${p.price}` }, { l: "NAV / Share", v: `$${p.nav}` },
          { l: "Price / NAV", v: `${pNav}%`, a: parseFloat(pNav) < 100 ? C.red : C.green },
          { l: "Discount to NAV", v: `(${disc}%)`, a: C.red },
          { l: "Dividend Yield", v: `${dy}%`, a: C.green },
          { l: "52-Wk Hi / Lo", v: `$${p.hi52} / $${p.lo52}` },
          { l: "Div Coverage", v: `${((p.coreEPS / p.divAnn) * 100).toFixed(0)}%` },
          { l: "Non-Accrual (FV)", v: `${p.naFV}%`, a: p.naFV > 3 ? C.red : C.navy },
          { l: "Non-Accrual (Cost)", v: `${p.naCost}%`, a: p.naCost > 5 ? C.red : C.navy },
          { l: "Market Cap", v: mktEquityFmt },
        ].map((k, i) => (
          <div key={i} style={{ padding: "6px 8px", background: C.frost, borderRadius: 3, borderLeft: `3px solid ${k.a || p.color}` }}>
            <div style={{ fontFamily: mono, fontSize: 8, color: C.muted, textTransform: "uppercase" }}>{k.l}</div>
            <div style={{ fontFamily: mono, fontSize: 14, fontWeight: 700, color: k.a || p.color, marginTop: 2 }}>{k.v}</div>
          </div>
        ))}
      </div>

      {/* Capital Structure KPIs */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(120px, 1fr))", gap: 7, marginBottom: 14 }}>
        {[
          { l: "Investments (Cost)", v: fmtA(totalCost) },
          { l: "Investments (FV)", v: fmtA(totalFV) },
          { l: "Cumulative Markdown", v: `(${fmtA(markdown)})`, a: C.red },
          { l: "Wtd Avg Spread", v: `S+${cs.wtdSpread}bps`, a: C.steel },

      </div>

      <Cbox items={[
        `Net interest spread of ${netSpread}% (${cs.wtdYield}% asset yield - ${cs.costOfDebt}% cost of funds). At ${p.de}x leverage this amplifies to ~${(netSpread * p.de).toFixed(0)}% levered return on equity before fees and losses.`,
        `Funding mix: ${((secDebt/totalLiab)*100).toFixed(0)}% secured / ${((unsecDebt/totalLiab)*100).toFixed(0)}% unsecured. ${unsecDebt > secDebt * 0.6 ? "IG-rated funding profile enables diversified unsecured bond market access with a staggered maturity ladder." : unsecDebt > secDebt * 0.3 ? "Balanced secured/unsecured mix provides funding flexibility." : "Heavier reliance on secured credit facilities; limited unsecured market access."}`,
        `Market-implied equity of ${mktEquityFmt} ($${p.price}/sh) vs. reported NAV of ${fmtA(p.equity)} ($${p.nav}/sh) represents a ${disc}% discount. The gap of ${fmtA(p.equity - mktEquity)} is the total value the market is deducting from the reported book — attributable to a mix of credit concerns and non-credit factors analyzed in the Implied Marks tab.`,
      ]} />
    </div>
  );
}

const TABS = [
  { id: "capstructure", label: "Capital Structure" },
  { id: "implied", label: "Implied Marks" },
  { id: "cohort", label: "Mark Cohorts" },
  { id: "na", label: "Non-Accrual & PIK" },

];

// ── Methodology Explainer ──
function MethodologyMod() {
  // Use ARCC as the worked example
  const p = BDC.ARCC;
  const t = BDC.TCPC;
  const pImp = (() => {
    const ncPS = p.nonCredit.reduce((s, f) => s + f.ps, 0);
    const eq = p.price * p.shares;
    const ncEq = ncPS * p.shares;
    const iFV = eq + p.liab - p.otherAssets;
    const iFVC = (iFV / p.invCost) * 100;
    const aEq = eq + ncEq;
    const aFV = aEq + p.liab - p.otherAssets;
    const aFVC = (aFV / p.invCost) * 100;
    return { ncPS, iFVC, aFVC, eq, ncEq, aEq };
  })();

  const tI = (() => {
    const ncPS = t.nonCredit.reduce((s, f) => s + f.ps, 0);
    const eq = t.price * t.shares;
    const ncEq = ncPS * t.shares;
    const aEq = eq + ncEq;
    const aFV = aEq + t.liab - t.otherAssets;
    const aFVC = (aFV / t.invCost) * 100;
    return { ncPS, aFVC };
  })();

  // Pre-computed values for the Step 5 worked example (+4pp recovery scenario)
  const ex = (() => {
    const rec = pImp.aFVC + 4;
    const iFV = (rec / 100) * p.invCost;
    const cAdj = iFV - p.liab + p.otherAssets;
    const mktEq = cAdj - pImp.ncEq;
    const px = mktEq / p.shares;
    const ret = ((px / p.price) - 1) * 100;
    const dy = (p.divAnn / p.price) * 100;
    return { rec, iFV, cAdj, mktEq, px, ret, dy };
  })();

  const S = ({ children }) => <span style={{ fontFamily: mono, fontWeight: 700, color: C.navy }}>{children}</span>;
  const R = ({ children }) => <span style={{ fontFamily: mono, fontWeight: 700, color: C.red }}>{children}</span>;
  const G = ({ children }) => <span style={{ fontFamily: mono, fontWeight: 700, color: C.green }}>{children}</span>;
  const H = ({ children }) => <div style={{ fontFamily: sans, fontSize: 15, fontWeight: 700, color: C.navy, marginTop: 20, marginBottom: 8, borderBottom: `2px solid ${C.navy}`, paddingBottom: 4 }}>{children}</div>;
  const P = ({ children }) => <p style={{ fontFamily: sans, fontSize: 12.5, color: C.navy, lineHeight: 1.65, margin: "0 0 10px 0" }}>{children}</p>;
  const Box = ({ title, children, accent }) => (
    <div style={{ margin: "12px 0", padding: "12px 16px", background: C.frost, borderLeft: `4px solid ${accent || C.navy}`, borderRadius: "0 4px 4px 0" }}>
      {title && <div style={{ fontFamily: mono, fontSize: 10, fontWeight: 700, color: accent || C.navy, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 6 }}>{title}</div>}
      {children}
    </div>
  );
  const Step = ({ n, title, children }) => (
    <div style={{ display: "flex", gap: 12, margin: "14px 0" }}>
      <div style={{ flex: "0 0 32px", height: 32, borderRadius: "50%", background: C.navy, color: "#fff", fontFamily: mono, fontSize: 14, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center" }}>{n}</div>
      <div style={{ flex: 1 }}>
        <div style={{ fontFamily: sans, fontSize: 13, fontWeight: 700, color: C.navy, marginBottom: 4 }}>{title}</div>
        <div style={{ fontFamily: sans, fontSize: 12, color: C.navy, lineHeight: 1.6 }}>{children}</div>
      </div>
    </div>
  );

  return (
    <div style={{ maxWidth: 820 }}>
      <h2 style={{ fontFamily: sans, fontSize: 20, fontWeight: 700, color: C.navy, margin: "0 0 4px 0" }}>Credit-Adjusted Recovery Methodology</h2>
      <p style={{ fontFamily: mono, fontSize: 11, color: C.muted, margin: "0 0 16px 0" }}>A framework for evaluating BDC equity investments using publicly available data</p>

      <H>The Core Insight</H>
      <P>
        When a BDC's stock trades below its reported NAV, the naive interpretation is that the market disagrees with the manager's portfolio marks. But in practice, the discount reflects a blend of factors — some about credit quality, some about earnings trajectory, some about market sentiment. This framework decomposes the discount to isolate the portion that is genuinely about the assets, producing a <S>Credit-Implied Recovery</S> that represents the market's true opinion on portfolio health.
      </P>
      <P>
        The investment thesis is simple: if your independent credit analysis concludes that the actual portfolio recovery will be <em>higher</em> than the Credit-Implied Recovery, the equity is mispriced and represents a buy. The sensitivity tables quantify the return at each recovery assumption.
      </P>

      <H>Step-by-Step Methodology</H>
      <P>Using ARCC (Ares Capital) as a worked example, with data as of March 11, 2026:</P>

      <Step n={1} title="Start with the Market Price and Reported NAV">
        ARCC trades at <S>${p.price}</S> per share. The most recently reported NAV (Q4 2025) is <S>${p.nav}</S> per share. The stock therefore trades at a <R>{((1 - p.price/p.nav)*100).toFixed(1)}% discount</R> to book value, implying the market believes equity is worth <S>${(p.price * p.shares / 1000).toFixed(1)}B</S> vs. the <S>${(p.equity / 1000).toFixed(1)}B</S> of reported stockholders' equity.
      </Step>

      <Step n={2} title="Compute the Unadjusted Implied Portfolio Marks">
        <P>If you attribute the <em>entire</em> discount to credit quality, you can reverse-engineer what the market thinks the portfolio is worth:</P>
        <Box title="Unadjusted Calculation">
          <div style={{ fontFamily: mono, fontSize: 11, lineHeight: 2 }}>
            Market Equity = <S>${p.price}</S> × <S>{p.shares}M shares</S> = <S>${(p.price * p.shares / 1000).toFixed(2)}B</S><br/>
            + Total Liabilities = <S>${(p.liab / 1000).toFixed(1)}B</S><br/>
            = Implied Total Assets = <S>${((p.price * p.shares + p.liab) / 1000).toFixed(2)}B</S><br/>
            − Other Assets (cash, receivables) = <S>${(p.otherAssets / 1000).toFixed(2)}B</S><br/>
            = <R>Implied Investment FV = ${((p.price * p.shares + p.liab - p.otherAssets) / 1000).toFixed(2)}B</R><br/>
            ÷ Investment Cost Basis = <S>${(p.invCost / 1000).toFixed(1)}B</S><br/>
            = <R>Unadjusted Implied FV/Cost = {pImp.iFVC.toFixed(1)}%</R> <span style={{ color: C.muted }}>(vs. {p.fvCost}% reported)</span>
          </div>
        </Box>
        <P>This says: if you assume the entire equity discount is because the market thinks the loans are worth less than the manager says, the implied portfolio recovery is <R>{pImp.iFVC.toFixed(1)}%</R> of cost — which is <R>{(p.fvCost - pImp.iFVC).toFixed(1)}pp below</R> the reported marks.</P>
      </Step>

      <Step n={3} title="Identify Non-Credit Discount Factors">
        <P>But the discount is not solely about credit. Multiple factors depress BDC equity prices without implying anything about the loan book:</P>
        <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: mono, fontSize: 11, margin: "8px 0" }}>
          <thead><tr style={{ borderBottom: `2px solid ${C.navy}` }}>
            {["Factor", "$/Share", "Rationale"].map(h => <th key={h} style={{ padding: "4px 8px", textAlign: h === "Factor" ? "left" : h === "$/Share" ? "right" : "left", color: C.navy, fontWeight: 700, fontSize: 9, textTransform: "uppercase" }}>{h}</th>)}
          </tr></thead>
          <tbody>
            {p.nonCredit.map((f, i) => (
              <tr key={i} style={{ borderBottom: `1px solid ${C.frost}`, background: i % 2 === 0 ? "#fff" : C.frost }}>
                <td style={{ padding: "4px 8px", fontWeight: 600, fontSize: 10 }}>
                  <span style={{ display: "inline-block", width: 8, height: 8, background: f.color, borderRadius: 1, marginRight: 5, verticalAlign: "middle" }}></span>
                  {f.label}
                </td>
                <td style={{ padding: "4px 8px", textAlign: "right", color: C.red, fontWeight: 600 }}>({f.ps.toFixed(2)})</td>
                <td style={{ padding: "4px 8px", fontSize: 10, color: C.steel }}>
                  {["NII compression from expected rate cuts; 89% floating rate amplifies sensitivity",
                    "BDC sector-wide de-rating; private credit stress headlines; liquidity premium widening",
                    "Fee structure consumes larger share of gross return as spreads compress",
                    "ATM issuance supply overhang; bearish options activity",
                    "Core EPS coverage tightening; market pricing probability of future dividend reduction",
                  ][i]}
                </td>
              </tr>
            ))}
            <tr style={{ borderTop: `2px solid ${C.navy}` }}>
              <td style={{ padding: "4px 8px", fontWeight: 700 }}>Total Non-Credit</td>
              <td style={{ padding: "4px 8px", textAlign: "right", fontWeight: 700, color: C.red }}>({pImp.ncPS.toFixed(2)})</td>
              <td style={{ padding: "4px 8px", fontSize: 10, color: C.muted }}>= {((pImp.ncPS / p.nav) * 100).toFixed(1)}% of NAV</td>
            </tr>
          </tbody>
        </table>
        <Box title="Important Caveat" accent={C.amber}>
          <P>These attribution estimates are analyst judgments, not observed data. They are the framework's primary assumption and should be debated by the investment committee. The value of the framework is in structuring the debate — forcing the question "how much of this discount is credit?" — rather than providing a precise answer.</P>
        </Box>
      </Step>

      <Step n={4} title="Compute the Credit-Implied Recovery">
        <P>Strip out the non-credit factors to isolate what the market is actually saying about the portfolio:</P>
        <Box title="Credit-Adjusted Calculation">
          <div style={{ fontFamily: mono, fontSize: 11, lineHeight: 2 }}>
            Total Discount = <S>${p.nav}</S> − <S>${p.price}</S> = <R>${(p.nav - p.price).toFixed(2)}/share</R><br/>
            − Non-Credit Factors = <S>${pImp.ncPS.toFixed(2)}/share</S><br/>
            = <R>Residual Credit Discount = ${(p.nav - p.price - pImp.ncPS).toFixed(2)}/share</R> ({((p.nav - p.price - pImp.ncPS) / p.nav * 100).toFixed(1)}% of NAV)<br/><br/>
            Credit-Adjusted Equity = Market Equity + Non-Credit Add-Back<br/>
            = <S>${(pImp.eq / 1000).toFixed(2)}B</S> + <S>${(pImp.ncEq / 1000).toFixed(2)}B</S> = <S>${(pImp.aEq / 1000).toFixed(2)}B</S><br/>
            → Implied Investment FV = <S>${((pImp.aEq + p.liab - p.otherAssets) / 1000).toFixed(2)}B</S><br/>
            → <G>Credit-Implied Recovery = {pImp.aFVC.toFixed(1)}%</G> <span style={{ color: C.muted }}>(vs. {p.fvCost}% reported, gap of only {(p.fvCost - pImp.aFVC).toFixed(1)}pp)</span>
          </div>
        </Box>
        <P>The Credit-Implied Recovery of <G>{pImp.aFVC.toFixed(1)}%</G> is much closer to the reported marks than the unadjusted <R>{pImp.iFVC.toFixed(1)}%</R>. This tells us: the market's genuine credit concern is modest — most of the discount is explained by non-credit headwinds.</P>
      </Step>

      <Step n={5} title="Form a Credit View and Compute the Return">
        <P>This is where your firm's private credit expertise becomes the edge. If your independent analysis of the portfolio concludes that the actual recovery will be <em>higher</em> than the Credit-Implied Recovery, the framework quantifies the upside:</P>
        <Box title="Example: Your View is +4pp Above Market-Implied">
          <div style={{ fontFamily: mono, fontSize: 11, lineHeight: 2 }}>
            Your Recovery View = <S>{pImp.aFVC.toFixed(1)}%</S> + <S>4.0pp</S> = <S>{ex.rec.toFixed(1)}%</S><br/>
            Implied Investment FV = <S>{ex.rec.toFixed(1)}%</S> x <S>${(p.invCost / 1000).toFixed(1)}B</S> = <S>${(ex.iFV / 1000).toFixed(2)}B</S><br/>
            Credit-Adj Equity = Implied FV - Liabilities + Other Assets = <S>${(ex.cAdj / 1000).toFixed(2)}B</S><br/>
            Market Equity = Credit-Adj Equity - Non-Credit Discount = <S>${(ex.mktEq / 1000).toFixed(2)}B</S><br/>
            Implied Price = <G>${ex.px.toFixed(2)}</G><br/>
            <G>Price Return = +{ex.ret.toFixed(1)}%</G> capital appreciation + <G>{ex.dy.toFixed(1)}%</G> dividend yield
          </div>
        </Box>
      </Step>

      <H>Key Assumptions & Limitations</H>
      <Box accent={C.amber}>
        <div style={{ fontFamily: sans, fontSize: 12, color: C.navy, lineHeight: 1.6 }}>
          <div style={{ marginBottom: 6 }}><strong>1. Non-credit factors are estimates.</strong> The attribution between rate compression, contagion, fees, etc. is judgment-based. Sensitivity of the conclusion to these inputs is highest when the residual credit component is small (e.g., ARCC) and lowest when it is large (e.g., TCPC at {((1 - t.price/t.nav)*100).toFixed(0)}% discount).</div>
          <div style={{ marginBottom: 6 }}><strong>2. Non-credit factors are held constant in the sensitivity.</strong> In reality, if credit improves, some non-credit factors (sector contagion, dividend risk) may also improve, making the return estimates conservative.</div>
          <div style={{ marginBottom: 6 }}><strong>3. The framework assumes liabilities and other assets are unchanged.</strong> Debt maturities, new issuance, and balance sheet changes will affect the actual equity value. This is a point-in-time snapshot, not a dynamic model.</div>
          <div style={{ marginBottom: 6 }}><strong>4. Reported marks are the manager's own assessment.</strong> The "Full Recovery to Reported Marks" scenario assumes the manager is right. Your firm's independent credit work should validate or challenge this assumption.</div>
          <div><strong>5. Dividend sustainability is not guaranteed.</strong> The yield shown is based on the current declared dividend. If the dividend is cut, both the income return and the non-credit attribution would change.</div>
        </div>
      </Box>

      <H>When to Use This Framework</H>
      <P>
        The Credit-Adjusted Recovery framework is designed for the <strong>initial screening and go/no-go decision</strong> on BDC equity positions. It answers the threshold question: "Is the market pricing in credit deterioration beyond what we see in the portfolio, or is the discount driven by factors unrelated to asset quality?" The answer determines whether to invest the time on a full deep dive (the individual BDC tabs) or pass.
      </P>
      <P>
        For names where the credit residual is small (like ARCC), the decision is primarily about your view on the non-credit headwinds — are they temporary? For names where the credit residual dominates (like TCPC), the decision is about whether you believe the portfolio can stabilize and recover. The return sensitivity tables in the Comparison tab quantify both cases.
      </P>


      <H>Appendix: Derivation of Non-Credit Discount Factors</H>
      <P>
        The non-credit attribution is the most subjective component of this framework. Each factor estimate is derived from observable market data and reasonable assumptions, but they are not precise measurements. Below we document the methodology for each factor so the IC can evaluate and adjust the inputs. ARCC is used as the primary worked example; TCPC differences are noted where the methodology diverges.
      </P>

      {/* Factor 1: NII / Rate Compression */}
      <Box title="1. NII / Rate Compression — ARCC: $0.45/share (2.3% of NAV) | TCPC: $0.16/share (2.3% of NAV)" accent="#5B8DB8">
        <P><strong>Rate sensitivity.</strong> ARCC has ~$26B of floating rate investments (89% of $29.5B). Each 25bps move in SOFR changes quarterly NII by approximately $0.015-0.02/share. The gross sensitivity is ~$0.023/share per 25bps ($26B x 0.0025 / 4 / 718.3M shares), but floating rate liabilities partially offset, bringing the net sensitivity to $0.015-0.02.</P>
        <P><strong>Forward curve application.</strong> As of 3/11/26, the SOFR forward curve implies roughly 75-100bps of additional cuts over the next 12 months. At the midpoint of ~75bps (three 25bps cuts), the annualized NII erosion is 3 cuts x $0.015-0.02/share/cut x 4 quarters = approximately $0.20-0.24/share.</P>
        <P><strong>Capitalization.</strong> This is the key judgment call. The NII erosion is expected to be temporary (rates eventually stabilize), so we do not capitalize at the full BDC P/E of 8-10x. We use approximately 5-6x, reflecting that the market treats this as a 2-3 year headwind, not permanent value destruction. So $0.20-0.24 x 5-6x = approximately $0.40-0.50/share. We use <strong>$0.45</strong> as the midpoint, which equals <strong>2.3% of NAV</strong>.</P>
        <P><strong>TCPC application.</strong> The same 2.3% of NAV is applied to TCPC: $7.07 x 2.3% = $0.16/share. Same rate curve, same proportional impact — the difference in absolute dollar terms is entirely a function of share price.</P>
        <P><strong>Sensitivity range.</strong> If the market treats rate compression as a longer-duration headwind (7-8x capitalization), the factor rises to $0.55-0.60. If very transient (3-4x), it drops to $0.30-0.35. This is the range the IC should debate.</P>
      </Box>

      {/* Factor 2: Sector Contagion */}
      <Box title="2. Sector Contagion / Liquidity — ARCC: $0.30/share | TCPC: $0.25/share" accent="#8FB8DE">
        <P><strong>The observable anomaly.</strong> Between September 2025 and March 2026, ARCC declined approximately 16% ($22.10 to $18.49). Over the same period, ARCC's reported credit metrics were stable or improving — non-accruals held at 1.2% FV, the par bucket increased, and NAV moved only from $20.01 to $19.94. The stock moved significantly more than fundamentals justify.</P>
        <P><strong>Sector evidence.</strong> Multiple BDCs cut dividends in early 2026. Blue Owl was downgraded. Headlines about stress spreading in private credit ran on CNBC. BDC sector average discount to NAV widened to levels not seen since 2020. This creates a guilt-by-association dynamic where even well-performing BDCs get sold.</P>
        <P><strong>Estimation approach.</strong> The total price decline of ~$3.61 must be allocated across all factors. After attributing $0.45 to rate compression, the remaining ~$3.16 is split among contagion, fee drag, technicals, dividend risk, and the credit residual. ARCC has a beta of roughly 0.7-0.8 to the BDC index. If the sector declined ~8-10% on sentiment alone, ARCC's sector-correlated component is roughly $1.20-1.60/share. But some of that sector decline reflects legitimate credit concerns at other BDCs, so we haircut to $0.25-0.35 and use <strong>$0.30</strong>.</P>
        <P><strong>TCPC is lower ($0.25)</strong> despite being more exposed to contagion due to smaller size and lower liquidity. The reason is attribution logic: when a name has real fundamental deterioration, less of the discount is unwarranted by definition. You cannot call something contagion if the credit losses are real.</P>
        <P><strong>Honest caveat.</strong> This is the hardest factor to pin down precisely. There is no formula that cleanly separates the market selling all BDCs because of headlines from the market reassessing ARCC's risk profile. The IC should ask: if sector headlines disappeared tomorrow but nothing else changed, how much of the discount would close?</P>
      </Box>

      {/* TCPC-only factor: NII Coverage Fragility */}
      <Box title="2b. NII Coverage Fragility — TCPC only: $0.15/share" accent="#6A9EC8">
        <P><strong>Why TCPC needs an additional factor.</strong> When a BDC is operating with minimal dividend coverage, each incremental basis point of rate decline has an outsized equity impact because it increases the probability of a further dividend cut, which re-prices the stock at a multiple of the cut. This is a non-linear dynamic that ARCC does not face because its coverage buffer is wider.</P>
        <P><strong>TCPC's trajectory.</strong> NII has compressed from $0.36 to $0.30 to $0.25/share over three quarters. The newly reduced $0.17 dividend is covered at 147%, but the trajectory implies further compression toward $0.20-0.22 if rates decline, which would narrow coverage to a level where another cut becomes likely. This convexity risk — where small NII changes trigger discrete re-pricing events — justifies <strong>$0.15/share</strong> of additional equity discount beyond the linear rate compression.</P>
      </Box>

      {/* Factor 3: Fee Drag */}
      <Box title="3. Fee Drag / Manager Economics — ARCC: $0.12/share | TCPC: $0.10/share" accent="#A3C7E6">
        <P><strong>The fixed cost problem.</strong> ARCC pays a 1.5% base management fee on total assets (~$31B), not net assets. That is approximately $465M per year regardless of what happens to NII. When ARCC was earning higher spreads and SOFR was 100bps higher, that $465M was perhaps 30-31% of gross investment income. As NII compresses, the same $465M becomes a larger share — closer to 34%. The fee does not flex down with revenue, so net return to equity holders gets squeezed disproportionately.</P>
        <P><strong>The incremental measurement.</strong> The question is not whether fees are too high in absolute terms — the market already prices in the base fee load. The question is: how much <em>additional</em> equity value drag does the fee create as spreads compress? As the fee-to-net-income ratio has risen by 2-3 percentage points, the incremental impact is approximately $0.10-0.15/share when capitalized. We use <strong>$0.12</strong>.</P>
        <P><strong>Cross-check.</strong> Internally-managed BDCs (e.g., Main Street Capital) do not have this problem and tend to trade at tighter discounts in comparable environments. The gap between externally- and internally-managed discount levels is consistent with our estimate.</P>
        <P><strong>TCPC ($0.10).</strong> Similar methodology, but TCPC's adviser voluntarily waived one-third of the base management fee for three quarters starting January 2025, adding back ~$0.02/share per quarter. The waiver is a positive signal (manager absorbing pain) but also confirms the fee burden was becoming problematic. The partial offset reduces the estimate to <strong>$0.10</strong>.</P>
      </Box>

      {/* Factor 4: Share Issuance / Technicals */}
      <Box title="4. Share Issuance / Technicals — ARCC: $0.15/share | TCPC: $0.08/share" accent="#C4D9EE">
        <P><strong>ARCC's ATM program.</strong> ARCC issued approximately 88 million new shares over the trailing 18 months via its at-the-market program, growing the share count from ~630M to 718M — about 14% dilution. The ATM works by continuously selling shares into the open market, creating a persistent supply overhang that dampens price recovery on any given day.</P>
        <P><strong>Academic basis.</strong> Literature on secondary offering discounts for closed-end funds and BDCs suggests ongoing issuance creates a transient 1-2% price impact — the stock trades lower than it otherwise would purely because of supply pressure, not because the issuance destroys value (ARCC issues above NAV, so it is NAV-accretive). Applied to a ~$19-20 stock, that is $0.15-0.30/share.</P>
        <P><strong>Why we use the low end ($0.15).</strong> ARCC's ATM has almost certainly been paused — BDCs typically suspend issuance below NAV because selling shares at a discount to book destroys NAV per share for existing holders. ARCC crossed below NAV in late 2025. The residual drag reflects the overhang from recent issuance and bearish put option volume in late February 2026, not ongoing selling. This is arguably the most temporary of all five factors — it should fade over 6-12 months regardless of what happens to credit.</P>
        <P><strong>TCPC is inverted ($0.08).</strong> TCPC is a net buyer, not issuer — they repurchased ~750,000 shares in Q4 2025 and early 2026 at prices well below NAV, which is good capital allocation. But with only 84M shares outstanding, a $322M market cap, and thin daily volume, the bid-ask spread is wide and any meaningful selling creates outsized price impact. We assign <strong>$0.08</strong> for illiquidity rather than supply overhang.</P>
      </Box>

      {/* Factor 5: Dividend Sustainability */}
      <Box title="5. Dividend Sustainability / Dividend Cut — ARCC: $0.10/share | TCPC: $0.35/share" accent="#D4A017">
        <P><strong>ARCC: probability-weighted future risk.</strong> Q4 2025 coverage was 104% ($0.50 EPS vs. $0.48 dividend) — the thinnest in several years, with a compressing trajectory. If SOFR drops another 75bps, core EPS probably falls toward $1.80-1.85, which would put coverage below 100% on a run-rate basis. The market does not need to think a cut is <em>likely</em> to price in some risk of it.</P>
        <P><strong>The signaling multiplier.</strong> BDC dividend cuts are not just income events — they are signals. The market interprets a cut as an admission that the manager sees deteriorating earnings power or credit quality. Practitioner evidence suggests BDC stocks re-price by roughly 10-12x the annual dividend reduction on announcement, capturing both the direct income loss and the signal effect.</P>
        <P><strong>ARCC probability weighting.</strong> We assign a 15-20% probability to a modest $0.02/quarter reduction over the next 12 months. The annualized income impact is $0.08/share. Probability-weighted: 15-20% x ($0.08 x 10-12x) = $0.10-0.19/share. We use <strong>$0.10</strong>, reflecting ARCC's 16+ year dividend track record and spillover income buffer.</P>
        <P><strong>TCPC: realized cut ($0.35).</strong> This is a different animal — not a probability-weighted future risk but a realized event. TCPC cut from $0.25 to $0.17/quarter (32% reduction). The annual dividend reduction of $0.32, multiplied by the 10-12x valuation impact, implies $0.32-0.38/share. We use <strong>$0.35</strong> as midpoint. We classify this as non-credit because it affects how the equity is <em>valued</em> as an income instrument, distinct from the asset mark question. But there is genuine overlap — the dividend was cut <em>because</em> of credit losses — which is why some portion of this $0.35 arguably belongs in the credit residual. That is a judgment the IC can make.</P>
        <P><strong>Cross-check.</strong> TCPC's actual stock decline around the cut announcement was ~$1.50+, against a $0.32 annual dividend reduction. That is a re-pricing ratio of ~4.7x — lower than our 10-12x assumption, but the cut was partially anticipated and the stock was already in freefall from credit losses. For a cleaner surprise cut at a healthier BDC, the 10-12x multiplier is more appropriate.</P>
      </Box>

      {/* The Residual */}
      <H>The Residual: What Remains Is the Market's Credit View</H>
      <P>
        Adding all five ARCC factors: $0.45 + $0.30 + $0.12 + $0.15 + $0.10 = <strong>${pImp.ncPS.toFixed(2)}/share</strong> of non-credit discount. The total discount is ${(p.nav - p.price).toFixed(2)} (${p.nav} - ${p.price}). That means <strong>{((pImp.ncPS / (p.nav - p.price)) * 100).toFixed(0)}%</strong> of the discount is non-credit and only <strong>{(((p.nav - p.price - pImp.ncPS) / (p.nav - p.price)) * 100).toFixed(0)}%</strong> — about <strong>${(p.nav - p.price - pImp.ncPS).toFixed(2)}/share</strong> — is the market's genuine credit concern. That residual, translated through the balance sheet, implies the market thinks the portfolio is recovering at {pImp.aFVC.toFixed(1)}% of cost versus the {p.fvCost}% the manager reports. A gap of only {(p.fvCost - pImp.aFVC).toFixed(1)}pp. The core finding for ARCC: the discount is real, but it is mostly not about the loans.
      </P>
      <P>
        For TCPC the math is the opposite. ${tI.ncPS.toFixed(2)} of non-credit against a ${(t.nav - t.price).toFixed(2)} total discount means only <strong>{((tI.ncPS / (t.nav - t.price)) * 100).toFixed(0)}%</strong> is non-credit and <strong>{(((t.nav - t.price - tI.ncPS) / (t.nav - t.price)) * 100).toFixed(0)}%</strong> is credit. The market is telling you the portfolio is impaired, and the framework confirms it. The Credit-Implied Recovery of {tI.aFVC.toFixed(1)}% is {(t.fvCost - tI.aFVC).toFixed(1)}pp below reported marks — a substantial gap suggesting further write-downs are likely.
      </P>
      <Box title="What the Residual Means for the Investment Decision" accent={C.navy}>
        <P>The residual is the number that matters. It is the market's credit view, stripped of noise. Your job as a private credit investor is to form an independent opinion on whether that residual is too large (the market is too pessimistic — buy), too small (the market is too generous — pass), or approximately right (the yield compensates you for the risk — hold or size small).</P>
        <P>For ARCC, the residual credit concern is modest (~{(p.nav - p.price - pImp.ncPS).toFixed(2)}/share, {(((p.nav - p.price - pImp.ncPS) / p.nav) * 100).toFixed(1)}% of NAV). If you believe the marks are approximately right, the discount is a potential entry point at {((p.divAnn / p.price) * 100).toFixed(1)}% yield. The risk is that the non-credit headwinds persist or worsen (further rate cuts, another sector shock), not that the portfolio deteriorates.</P>
        <P>For TCPC, the residual credit concern dominates (~${(t.nav - t.price - tI.ncPS).toFixed(2)}/share, {(((t.nav - t.price - tI.ncPS) / t.nav) * 100).toFixed(1)}% of NAV). This is a high-conviction trade: the return per point of recovery improvement is large (leverage amplification), but you need to believe the portfolio can stabilize. The Q4 2025 NAV crash from $8.71 to $7.07, non-accruals at 9.7% of cost, and 91% of losses from pre-2022 vintages all suggest genuine impairment rather than temporary marks noise.</P>
      </Box>

      {/* Sensitivity table */}
      <H>Sensitivity of Conclusions to Attribution Estimates</H>
      <Box accent={C.amber}>
        <P>The table below shows how the Credit-Implied Recovery changes if the total non-credit attribution is adjusted +/-25% from our base case. This quantifies the sensitivity of the framework's conclusions to the subjective inputs.</P>
        <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: mono, fontSize: 11, margin: "8px 0" }}>
          <thead><tr style={{ borderBottom: `2px solid ${C.navy}` }}>
            {["Attribution Scenario", "ARCC Non-Credit", "ARCC Credit Recovery", "TCPC Non-Credit", "TCPC Credit Recovery"].map(h => <th key={h} style={{ padding: "4px 6px", textAlign: h.includes("Scenario") ? "left" : "right", color: C.navy, fontWeight: 700, fontSize: 8, textTransform: "uppercase" }}>{h}</th>)}
          </tr></thead>
          <tbody>
            {[
              { label: "Low (-25%)", mult: 0.75 },
              { label: "Base Case", mult: 1.0 },
              { label: "High (+25%)", mult: 1.25 },
            ].map((sc, i) => {
              const arccNC = pImp.ncPS * sc.mult;
              const arccAdjEq = (p.price * p.shares) + (arccNC * p.shares);
              const arccAdjFVC = ((arccAdjEq + p.liab - p.otherAssets) / p.invCost * 100);

              const tNC = t.nonCredit.reduce((s,f)=>s+f.ps,0) * sc.mult;
              const tAdjEq = (t.price * t.shares) + (tNC * t.shares);
              const tAdjFVC = ((tAdjEq + t.liab - t.otherAssets) / t.invCost * 100);

              return (
                <tr key={i} style={{ borderBottom: `1px solid ${C.frost}`, background: sc.mult === 1 ? "#FFF8E7" : i % 2 === 0 ? "#fff" : C.frost, fontWeight: sc.mult === 1 ? 600 : 400 }}>
                  <td style={{ padding: "5px 6px", fontWeight: 600, color: C.navy }}>{sc.label}</td>
                  <td style={{ padding: "5px 6px", textAlign: "right" }}>${arccNC.toFixed(2)}/sh</td>
                  <td style={{ padding: "5px 6px", textAlign: "right", fontWeight: 700, color: arccAdjFVC >= 96 ? C.green : C.amber }}>{arccAdjFVC.toFixed(1)}%</td>
                  <td style={{ padding: "5px 6px", textAlign: "right" }}>${tNC.toFixed(2)}/sh</td>
                  <td style={{ padding: "5px 6px", textAlign: "right", fontWeight: 700, color: tAdjFVC >= 90 ? C.amber : C.red }}>{tAdjFVC.toFixed(1)}%</td>
                </tr>
              );
            })}
          </tbody>
        </table>
        <P>
          For ARCC, a +/-25% swing in the non-credit attribution shifts the credit-implied recovery by approximately +/-{((pImp.ncPS * 0.25 * p.shares) / p.invCost * 100).toFixed(1)}pp — meaningful but does not change the qualitative conclusion (modest credit concern). For TCPC, the same swing shifts recovery by approximately +/-{((t.nonCredit.reduce((s,f)=>s+f.ps,0) * 0.25 * t.shares) / t.invCost * 100).toFixed(1)}pp — directionally insignificant because the credit component dominates regardless. This asymmetry is a feature of the framework: it is most precise where it matters least (heavily credit-driven names) and most sensitive where the debate is genuinely close.
        </P>
      </Box>
    </div>
  );
}

// ── Executive Summary ──
function ExecSummary() {
  const all = Object.values(BDC);
  const getImp = (p) => {
    const ncPS = p.nonCredit.reduce((s, f) => s + f.ps, 0);
    const eq = p.price * p.shares;
    const ncEq = ncPS * p.shares;
    const aEq = eq + ncEq;
    const aFV = aEq + p.liab - p.otherAssets;
    const aFVC = (aFV / p.invCost) * 100;
    return { ncPS, aFVC };
  };

  const avgDiscount = all.reduce((s, p) => s + (1 - p.price / p.nav) * 100, 0) / all.length;
  const avgFVCost = all.reduce((s, p) => s + p.fvCost, 0) / all.length;
  const avgImplied = all.reduce((s, p) => s + getImp(p).aFVC, 0) / all.length;
  const lowNA = all.filter(p => p.naFV <= 1.0);

  const P = ({ children }) => <p style={{ margin: "0 0 12px 0" }}>{children}</p>;
  const S = ({ children }) => <span style={{ fontFamily: mono, fontWeight: 700, color: C.navy }}>{children}</span>;
  const G = ({ children }) => <span style={{ fontFamily: mono, fontWeight: 700, color: C.green }}>{children}</span>;
  const R = ({ children }) => <span style={{ fontFamily: mono, fontWeight: 700, color: C.red }}>{children}</span>;

  return (
    <div style={{ fontFamily: sans, fontSize: 13, lineHeight: 1.75, color: C.navy }}>
      <div style={{ background: C.frost, borderLeft: `4px solid ${C.navy}`, padding: "14px 18px", marginBottom: 20, borderRadius: "0 4px 4px 0" }}>
        <div style={{ fontFamily: mono, fontSize: 11, fontWeight: 700, color: C.navy, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8 }}>Investment Thesis</div>
        <div style={{ fontSize: 14, lineHeight: 1.6 }}>
          BDC equity prices have declined 15-35% from July 2025 peaks across seven names in our coverage set. The selloff has been driven by NII compression expectations from Fed rate cuts, sector contagion from private credit stress headlines, and the January 2026 AI narrative — <strong>not by deterioration in underlying portfolio credit quality</strong>. Our Credit-Adjusted Recovery framework confirms that for 6 of 7 names, the market-implied portfolio recovery rate is within <S>{(avgFVCost - avgImplied).toFixed(1)}pp</S> of reported marks. The exception is TCPC, where the discount reflects genuine impairment. We believe the current de-rating has created attractive entry points in select names where non-credit discount factors dominate.
        </div>
      </div>

      <div style={{ fontFamily: mono, fontSize: 10, fontWeight: 700, color: C.navy, textTransform: "uppercase", letterSpacing: "0.06em", padding: "6px 8px", background: C.frost, borderLeft: `3px solid ${C.navy}`, marginBottom: 10 }}>
        Market Context
      </div>
      <P>
        The BDC sector is <strong>not dislocated</strong> in the way it was during COVID (March 2020) or the GFC — this is not a liquidity crisis or a sudden credit shock. Rather, it is a prolonged de-rating that has built over eight months, driven by a gradual shift in the rate environment and compounded by sector-specific narrative events. The drawdown has been orderly, with steady volume and no forced selling outside of OTF's lock-up releases.
      </P>
      <P>
        Prices peaked in <G>July 2025</G> when the sector benefited from peak SOFR base rates (~5.3%), clean credit metrics, and a post-tariff-shock relief rally. The Fed's pivot to rate cuts in September initiated the unwind — NII compression became the dominant repricing theme. Private credit stress headlines in October added contagion. The DeepSeek AI selloff in January 2026 accelerated the decline for software-heavy names but was largely a continuation of the existing trend for most of the set. The average discount across our 7 names is now <R>{avgDiscount.toFixed(0)}%</R>.
      </P>

      <div style={{ fontFamily: mono, fontSize: 10, fontWeight: 700, color: C.navy, textTransform: "uppercase", letterSpacing: "0.06em", padding: "6px 8px", background: C.frost, borderLeft: `3px solid ${C.navy}`, marginBottom: 10 }}>
        Methodology & Conclusion
      </div>
      <P>
        Our <strong>Credit-Adjusted Recovery</strong> framework decomposes each BDC's discount to NAV into identifiable non-credit factors (rate compression, sector contagion, fee drag, idiosyncratic events like lock-ups or merger overhang, dividend risk) and a residual that represents the market's genuine credit concern. The rate compression factor is standardized at 2.3% of NAV across all names — same forward curve, same proportional impact. Idiosyncratic factors are estimated per-name from observable data (lock-up schedules, fee structures, coverage ratios, ATM activity).
      </P>
      <P>
        After stripping non-credit factors, we reverse-engineer the market-implied portfolio recovery rate (FV/Cost) and compare it to reported marks. A small gap suggests the market agrees with the manager's marks and the discount is driven by non-credit sentiment. A large gap suggests the market is pricing in credit losses beyond what the manager has recognized.
      </P>
      <P>
        <strong>The conclusion across 7 names:</strong> the market is broadly <em>not</em> pricing in material incremental credit risk. The average reported FV/Cost is <S>{avgFVCost.toFixed(1)}%</S> and the average credit-implied recovery is <S>{avgImplied.toFixed(1)}%</S> — a gap of just <S>{(avgFVCost - avgImplied).toFixed(1)}pp</S>. For the 5 names with non-accruals below 1% of FV ({lowNA.map(p => p.ticker).join(", ")}), the credit residual is negligible. The discounts are overwhelmingly explained by rate compression, premium normalization, and idiosyncratic non-credit events. This creates an opportunity set for investors with a constructive credit view who can tolerate near-term NII compression in exchange for entry yields of 10-14% with potential capital appreciation as non-credit headwinds fade.
      </P>

      {/* Quick Summary Table */}
      <div style={{ fontFamily: mono, fontSize: 10, fontWeight: 700, color: C.navy, textTransform: "uppercase", letterSpacing: "0.06em", padding: "6px 8px", background: C.frost, borderLeft: `3px solid ${C.navy}`, marginBottom: 0, marginTop: 16 }}>
        Coverage Set at a Glance
      </div>

        <thead><tr style={{ borderBottom: `2px solid ${C.navy}` }}>
          {["", "Price", "NAV", "Disc.", "FV/Cost", "NA (FV)", "Cr-Impl", "Gap", "Yield"].map(h =>
            <th key={h} style={{ padding: "5px 4px", textAlign: h === "" ? "left" : "right", color: C.navy, fontWeight: 700, fontSize: 8, textTransform: "uppercase" }}>{h}</th>
          )}
        </tr></thead>
        <tbody>
          {all.sort((a, b) => (b.price / b.nav) - (a.price / a.nav)).map((p, i) => {
            const imp = getImp(p);
            const gap = p.fvCost - imp.aFVC;
            const disc = (1 - p.price / p.nav) * 100;
            const dy = (p.divAnn / p.price) * 100;
            return (
              <tr key={p.ticker} style={{ borderBottom: `1px solid ${C.frost}`, background: i % 2 === 0 ? "#fff" : C.frost }}>
                <td style={{ padding: "5px 4px", fontWeight: 700, color: p.color }}>{p.ticker}</td>
                <td style={{ padding: "5px 4px", textAlign: "right" }}>${p.price}</td>
                <td style={{ padding: "5px 4px", textAlign: "right" }}>${p.nav}</td>
                <td style={{ padding: "5px 4px", textAlign: "right", color: disc > 0 ? C.red : C.green }}>{disc > 0 ? `(${disc.toFixed(0)}%)` : `+${(-disc).toFixed(0)}%`}</td>
                <td style={{ padding: "5px 4px", textAlign: "right", color: p.fvCost >= 97 ? C.green : p.fvCost >= 93 ? C.amber : C.red }}>{p.fvCost}%</td>
                <td style={{ padding: "5px 4px", textAlign: "right", color: p.naFV <= 1 ? C.green : p.naFV <= 3 ? C.amber : C.red }}>{p.naFV}%</td>
                <td style={{ padding: "5px 4px", textAlign: "right" }}>{imp.aFVC.toFixed(1)}%</td>
                <td style={{ padding: "5px 4px", textAlign: "right", color: gap <= 1.5 ? C.green : gap <= 3 ? C.amber : C.red }}>{gap.toFixed(1)}pp</td>
                <td style={{ padding: "5px 4px", textAlign: "right", color: C.green }}>{dy.toFixed(1)}%</td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}
